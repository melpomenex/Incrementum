[build]
jobs = 1
target-dir = "target"

# Force a known-good linker path on Linux. This avoids rust-lld/LLD issues on
# large builds (crashes, relocation errors) and works across Rust toolchains.
# Prefer the system C toolchain by default (typically GCC on Linux).
# Using `clang` here has caused intermittent crashes in some environments.
[target.x86_64-unknown-linux-gnu]
linker = "cc"

# NOTE: We intentionally do NOT force `mold` here.
# In some environments `-fuse-ld=mold` has caused non-deterministic build
# crashes (e.g. `free(): invalid next size` / SIGABRT during compilation).
# If you want to opt-in locally, set `RUSTFLAGS="-C link-arg=-fuse-ld=mold"`.
