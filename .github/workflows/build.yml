name: Build Incrementum

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-fast:
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.89.0

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Increase Rust stack size (Windows)
        run: echo "RUST_MIN_STACK=33554432" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Sync node version and setup cache
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Run Anki LaTeX compatibility regression tests
        run: npm run test:run -- src/utils/__tests__/ankiLatex.test.ts src/components/review/__tests__/FlashcardScrollItem.test.tsx

      - name: Build frontend
        run: npm run build

      - name: Build Tauri application (Windows)
        uses: tauri-apps/tauri-action@v0.6
        with:
          args: --bundles nsis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTEBOOKLM_BUNDLE_RUNTIME: "1"
          POCKET_TTS_BUNDLE_RUNTIME: "1"
          LIBSQLITE3_SYS_USE_PKG_CONFIG: "0"
          SQLITE3_STATIC: "1"
          VCPKGRS_DYNAMIC: "0"
          SQLX_OFFLINE: "true"

      - name: Verify Windows bundles include NotebookLM runtime
        shell: pwsh
        run: |
          ./scripts/verify-windows-bundles.ps1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: incrementum-windows
          path: |
            src-tauri/target/**/release/bundle/**
          if-no-files-found: warn

  build:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    continue-on-error: ${{ !matrix.required }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: windows-x86_64
            platform: windows-latest
            os: windows
            arch: x86_64
            tauri_args: --bundles nsis
            required: false
          - id: macos-aarch64
            platform: macos-latest
            os: macos
            arch: aarch64
            tauri_args: --bundles dmg
            required: true
          - id: linux-x86_64
            platform: ubuntu-latest
            os: linux
            arch: x86_64
            tauri_args: --bundles deb
            required: true
          - id: linux-aarch64
            platform: ubuntu-24.04-arm
            os: linux
            arch: aarch64
            tauri_args: --bundles deb
            required: false

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies (Ubuntu only)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          sudo apt-get install -y libfuse2 || sudo apt-get install -y libfuse2t64
          # Install GStreamer plugins for video playback support
          sudo apt-get install -y \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav \
            gstreamer1.0-gl

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.89.0

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Increase Rust stack size (Unix)
        if: matrix.os != 'windows'
        run: echo "RUST_MIN_STACK=33554432" >> $GITHUB_ENV

      - name: Increase Rust stack size (Windows)
        if: matrix.os == 'windows'
        run: echo "RUST_MIN_STACK=33554432" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Sync node version and setup cache
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Run Anki LaTeX compatibility regression tests
        run: npm run test:run -- src/utils/__tests__/ankiLatex.test.ts src/components/review/__tests__/FlashcardScrollItem.test.tsx

      - name: Validate tag matches app versions
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const tag = context.ref.replace("refs/tags/", "");
            const expected = tag.replace(/^v/, "");
            const packageVersion = JSON.parse(fs.readFileSync("package.json", "utf8")).version;
            const tauriVersion = JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json", "utf8")).version;
            const cargoToml = fs.readFileSync("src-tauri/Cargo.toml", "utf8");
            const cargoVersion = (cargoToml.match(/^version = "([^"]+)"/m) || [])[1];

            core.info(`Tag: ${tag}`);
            core.info(`Expected semantic version: ${expected}`);
            core.info(`package.json: ${packageVersion}`);
            core.info(`tauri.conf.json: ${tauriVersion}`);
            core.info(`Cargo.toml: ${cargoVersion}`);

            if (!cargoVersion) {
              core.setFailed("Could not read version from src-tauri/Cargo.toml");
            }

            const mismatches = [
              packageVersion === expected ? null : `package.json is ${packageVersion}`,
              tauriVersion === expected ? null : `tauri.conf.json is ${tauriVersion}`,
              cargoVersion === expected ? null : `Cargo.toml is ${cargoVersion}`,
            ].filter(Boolean);

            if (mismatches.length > 0) {
              core.setFailed(`Tag/version mismatch for ${tag}. Expected ${expected}; ${mismatches.join(", ")}.`);
            }

      - name: Build frontend
        run: npm run build

      - name: Build Tauri application
        uses: tauri-apps/tauri-action@v0.6
        with:
          # AppImage remains in a dedicated job. Matrix builds focus on .deb, dmg, and nsis.
          args: ${{ matrix.tauri_args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTEBOOKLM_BUNDLE_RUNTIME: "1"
          POCKET_TTS_BUNDLE_RUNTIME: "1"
          LIBSQLITE3_SYS_USE_PKG_CONFIG: ${{ matrix.os == 'linux' && '1' || '0' }}
          SQLITE3_STATIC: ${{ matrix.os == 'linux' && '0' || '1' }}
          VCPKGRS_DYNAMIC: ${{ matrix.os == 'windows' && '0' || '' }}
          SQLX_OFFLINE: "true"

      - name: Verify Linux deb bundle includes NotebookLM runtime
        if: matrix.id == 'linux-x86_64'
        shell: bash
        run: |
          chmod +x scripts/verify-deb-bundle.sh
          scripts/verify-deb-bundle.sh

      - name: Verify Windows bundles include NotebookLM runtime
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          ./scripts/verify-windows-bundles.ps1

      - name: Verify macOS bundles include NotebookLM runtime
        if: matrix.os == 'macos'
        shell: bash
        run: |
          chmod +x scripts/verify-macos-bundles.sh
          scripts/verify-macos-bundles.sh

      - name: List bundle directory (debug)
        run: |
          echo "=== Bundle directory contents ==="
          find src-tauri/target -name "bundle" -type d 2>/dev/null | head -5 || true
          find src-tauri/target -path "*/bundle/*" -type f 2>/dev/null | head -20 || true
          echo "=== Release directory ==="
          ls -la src-tauri/target/release/ 2>/dev/null || echo "No release dir"
          ls -la src-tauri/target/release/bundle/ 2>/dev/null || echo "No bundle dir"
          echo "=== Release bundle (any target triple) ==="
          find src-tauri/target -path "*/release/bundle/*" -type f 2>/dev/null | head -50 || true
        shell: bash


      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: incrementum-${{ matrix.id }}
          path: |
            src-tauri/target/**/release/bundle/**
          if-no-files-found: warn

      - name: Add per-architecture summary
        if: always()
        shell: bash
        run: |
          {
            echo "### Build target \`${{ matrix.id }}\`"
            echo "- Required: \`${{ matrix.required }}\`"
            echo "- Runner: \`${{ matrix.platform }}\`"
            echo "- Architecture: \`${{ matrix.arch }}\`"
            echo "- Job status: \`${{ job.status }}\`"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload to release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/**/release/bundle/**/*.deb
            src-tauri/target/**/release/bundle/**/*.rpm
            src-tauri/target/**/release/bundle/**/*.AppImage
            src-tauri/target/**/release/bundle/**/*.dmg
            src-tauri/target/**/release/bundle/**/*.app.tar.gz
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
          name: Incrementum ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}

  build-appimage:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          # Install GStreamer plugins for video playback support
          sudo apt-get install -y \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav
          sudo apt-get install -y libfuse2 || sudo apt-get install -y libfuse2t64
          # Install GStreamer plugins for video playback support in AppImage
          sudo apt-get install -y \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav \
            gstreamer1.0-gl \
            gstreamer1.0-gtk3 \
            libgstreamer1.0-0 \
            libgstreamer-plugins-base1.0-0 \
            libgstreamer-plugins-good1.0-0

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.89.0

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Increase Rust stack size
        run: echo "RUST_MIN_STACK=33554432" >> $GITHUB_ENV

      - name: Sync node version and setup cache
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate tag matches app versions
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const tag = context.ref.replace("refs/tags/", "");
            const expected = tag.replace(/^v/, "");
            const packageVersion = JSON.parse(fs.readFileSync("package.json", "utf8")).version;
            const tauriVersion = JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json", "utf8")).version;
            const cargoToml = fs.readFileSync("src-tauri/Cargo.toml", "utf8");
            const cargoVersion = (cargoToml.match(/^version = "([^"]+)"/m) || [])[1];

            core.info(`Tag: ${tag}`);
            core.info(`Expected semantic version: ${expected}`);
            core.info(`package.json: ${packageVersion}`);
            core.info(`tauri.conf.json: ${tauriVersion}`);
            core.info(`Cargo.toml: ${cargoVersion}`);

            if (!cargoVersion) {
              core.setFailed("Could not read version from src-tauri/Cargo.toml");
            }

            const mismatches = [
              packageVersion === expected ? null : `package.json is ${packageVersion}`,
              tauriVersion === expected ? null : `tauri.conf.json is ${tauriVersion}`,
              cargoVersion === expected ? null : `Cargo.toml is ${cargoVersion}`,
            ].filter(Boolean);

            if (mismatches.length > 0) {
              core.setFailed(`Tag/version mismatch for ${tag}. Expected ${expected}; ${mismatches.join(", ")}.`);
            }

      - name: Build frontend
        run: npm run build

      - name: Build Tauri AppImage (with fallback repack)
        run: |
          scripts/ci-build-appimage.sh
        env:
          TAURI_BUNDLE_APPIMAGE: "true"
          APPIMAGE_EXTRACT_AND_RUN: "1"

      - name: List AppImage bundle (debug)
        shell: bash
        run: |
          echo "=== AppImage bundle directory contents ==="
          ls -la src-tauri/target/release/bundle/appimage/ 2>/dev/null || true
          find src-tauri/target -path "*/release/bundle/appimage/*" -type f 2>/dev/null || true

      - name: Upload AppImage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: incrementum-appimage
          path: src-tauri/target/release/bundle/appimage/*
          if-no-files-found: warn

      - name: Upload AppImage to release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/appimage/*.AppImage
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
          name: Incrementum ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}

  build-arch:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    steps:
      - name: Install git for checkout
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed git

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Arch dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed base-devel git webkit2gtk-4.1 gtk3 libappindicator-gtk3 librsvg patchelf npm nodejs rust ttf-dejavu clang lld sqlite

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate tag matches app versions
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const tag = context.ref.replace("refs/tags/", "");
            const expected = tag.replace(/^v/, "");
            const packageVersion = JSON.parse(fs.readFileSync("package.json", "utf8")).version;
            const tauriVersion = JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json", "utf8")).version;
            const cargoToml = fs.readFileSync("src-tauri/Cargo.toml", "utf8");
            const cargoVersion = (cargoToml.match(/^version = "([^"]+)"/m) || [])[1];

            core.info(`Tag: ${tag}`);
            core.info(`Expected semantic version: ${expected}`);
            core.info(`package.json: ${packageVersion}`);
            core.info(`tauri.conf.json: ${tauriVersion}`);
            core.info(`Cargo.toml: ${cargoVersion}`);

            if (!cargoVersion) {
              core.setFailed("Could not read version from src-tauri/Cargo.toml");
            }

            const mismatches = [
              packageVersion === expected ? null : `package.json is ${packageVersion}`,
              tauriVersion === expected ? null : `tauri.conf.json is ${tauriVersion}`,
              cargoVersion === expected ? null : `Cargo.toml is ${cargoVersion}`,
            ].filter(Boolean);

            if (mismatches.length > 0) {
              core.setFailed(`Tag/version mismatch for ${tag}. Expected ${expected}; ${mismatches.join(", ")}.`);
            }

      - name: Build frontend
        run: npm run build

      - name: Build Tauri application
        run: |
          cd src-tauri
          cargo build --release
        env:
          RUST_MIN_STACK: 33554432
          LIBSQLITE3_SYS_USE_PKG_CONFIG: "1"
          SQLITE3_STATIC: "0"
          ZSTD_SYS_USE_PKG_CONFIG: "1"
          RUSTFLAGS: -C link-arg=-lsqlite3 -C link-arg=-lzstd

      - name: Create Pacman package
        run: |
          PKG_VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | awk -F'"' '{print $2}')
          PKG_RELEASE=1

          mkdir -p arch-pkg/incrementum-${PKG_VERSION}-${PKG_RELEASE}/src
          mkdir -p arch-pkg/incrementum-${PKG_VERSION}-${PKG_RELEASE}/pkg

          # Create PKGBUILD
          cat > arch-pkg/PKGBUILD << EOF
          pkgname=incrementum
          pkgver=${PKG_VERSION}
          pkgrel=${PKG_RELEASE}
          pkgdesc="Incrementum - Spaced repetition and incremental reading for effective learning"
          arch=('x86_64')
          url="https://github.com/melpomenex/incrementum-tauri"
          license=('MIT')
          depends=('webkit2gtk-4.1' 'gtk3' 'libappindicator-gtk3' 'librsvg' 'gcc-libs' 'glibc' 'zstd')
          makedepends=('rust' 'pkgconf')
          optdepends=('notebooklm-py: NotebookLM integration for AI-powered flashcard generation'
                      'python-notebooklm: Alternative NotebookLM package')
          source=("\$pkgname-\$pkgver::git+https://github.com/melpomenex/incrementum-tauri.git#tag=v\$pkgver")
          sha256sums=('SKIP')

          build() {
            cd "\$pkgname-\$pkgver"
            npm ci
            npm run build
            cd src-tauri
            env LIBSQLITE3_SYS_USE_PKG_CONFIG=1 SQLITE3_STATIC=0 ZSTD_SYS_USE_PKG_CONFIG=1 RUSTFLAGS="-C link-arg=-lsqlite3 -C link-arg=-lzstd" cargo build --release
          }

          package() {
            cd "\$pkgname-\$pkgver"
            install -Dm755 "src-tauri/target/release/incrementum-tauri" "\$pkgdir/usr/bin/incrementum"
            install -Dm644 "src-tauri/icons/128x128.png" "\$pkgdir/usr/share/icons/hicolor/128x128/apps/incrementum.png"
            install -Dm644 "src-tauri/incrementum.desktop" "\$pkgdir/usr/share/applications/incrementum.desktop" || true
          }
          EOF

          # Build the package
          cd arch-pkg
          useradd -m builder
          chown -R builder:builder /__w/incrementum-tauri/incrementum-tauri/arch-pkg
          su builder -c "cd /__w/incrementum-tauri/incrementum-tauri/arch-pkg && makepkg -s --noconfirm --nosign"

      - name: Upload Pacman artifacts
        uses: actions/upload-artifact@v4
        with:
          name: incrementum-arch
          path: arch-pkg/*.pkg.tar.zst
          if-no-files-found: warn

      - name: Upload Pacman to release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: arch-pkg/*.pkg.tar.zst
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
          name: Incrementum ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}

  release-readiness:
    needs: [build, build-appimage, build-arch]
    if: ${{ (startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch') && always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Summarize required and optional architecture outcomes
        run: |
          {
            echo "## Release readiness"
            echo "- build matrix: \`${{ needs.build.result }}\`"
            echo "- build-appimage: \`${{ needs.build-appimage.result }}\`"
            echo "- build-arch: \`${{ needs.build-arch.result }}\`"
            echo ""
            echo "Required: \`macos-aarch64\`, \`linux-x86_64\`, \`build-appimage\`, \`build-arch\`"
            echo "Optional: \`windows-x86_64\`, \`linux-aarch64\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce required architecture gate
        run: |
          test "${{ needs.build.result }}" = "success"
          test "${{ needs.build-appimage.result }}" = "success"
          test "${{ needs.build-arch.result }}" = "success"

  sync-release-notes:
    needs: [release-readiness]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract release notes from changelog
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\]" { capture=1; next }
            capture && $0 ~ "^## \\[" { exit }
            capture { print }
          ' CHANGELOG.md > release_notes.md

          if [ ! -s release_notes.md ]; then
            echo "Failed to extract release notes for ${VERSION} from CHANGELOG.md"
            exit 1
          fi

      - name: Sync GitHub release body from changelog
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.89.0

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Increase Rust stack size
        run: echo "RUST_MIN_STACK=33554432" >> $GITHUB_ENV

      - name: Sync node version and setup cache
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run -- --no-file-parallelism --maxWorkers=1
        env:
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
