name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Release tag to build, e.g. v1.21.12'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    continue-on-error: ${{ !matrix.required }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: macos-aarch64
            platform: macos-latest
            os: macos
            arch: aarch64
            tauri_args: --bundles dmg
            required: true
          - id: windows-x86_64
            platform: windows-latest
            os: windows
            arch: x86_64
            tauri_args: --bundles nsis
            required: false
          - id: linux-x86_64
            platform: ubuntu-latest
            os: linux
            arch: x86_64
            tauri_args: --bundles deb
            required: true
          - id: linux-aarch64
            platform: ubuntu-24.04-arm
            os: linux
            arch: aarch64
            tauri_args: --bundles deb
            required: false

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version_tag || github.ref }}
          submodules: recursive

      - name: Install dependencies (Ubuntu only)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          sudo apt-get install -y libfuse2 || sudo apt-get install -y libfuse2t64

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.89.0

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Increase Rust stack size (Unix)
        if: matrix.os != 'windows'
        run: echo "RUST_MIN_STACK=33554432" >> $GITHUB_ENV

      - name: Increase Rust stack size (Windows)
        if: matrix.os == 'windows'
        run: echo "RUST_MIN_STACK=33554432" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Sync node version and setup cache
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Get version from tag
        id: get_version
        uses: actions/github-script@v7
        with:
          script: |
            const version = context.eventName === 'workflow_dispatch'
              ? '${{ github.event.inputs.version_tag }}'
              : context.ref.replace('refs/tags/', '');
            core.setOutput('VERSION', version);

      - name: Validate tag matches app versions
        shell: bash
        run: |
          TAG_RAW="${{ steps.get_version.outputs.VERSION }}"
          TAG_VERSION="${TAG_RAW#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAURI_VERSION="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          CARGO_VERSION="$(grep '^version = ' src-tauri/Cargo.toml | head -1 | sed -E 's/version = \"([^\"]+)\"/\1/')"

          echo "Tag: ${TAG_RAW}"
          echo "Expected semantic version: ${TAG_VERSION}"
          echo "package.json: ${PACKAGE_VERSION}"
          echo "tauri.conf.json: ${TAURI_VERSION}"
          echo "Cargo.toml: ${CARGO_VERSION}"

          test "${PACKAGE_VERSION}" = "${TAG_VERSION}"
          test "${TAURI_VERSION}" = "${TAG_VERSION}"
          test "${CARGO_VERSION}" = "${TAG_VERSION}"

      - name: Install create-dmg (macOS only)
        if: matrix.os == 'macos'
        run: brew install create-dmg

      # macOS code signing - Option 1: Ad-hoc signing (no certificate needed)
      - name: Import ad-hoc signing (macOS)
        if: matrix.os == 'macos'
        run: |
          echo "TAURI_SIGNING_IDENTITY=-" >> $GITHUB_ENV
          echo "APPLE_SIGNING_IDENTITY=-" >> $GITHUB_ENV

      # macOS code signing - Option 2: Proper signing (uncomment if you have certificates)
      # To use this, add these secrets to your GitHub repository:
      # - APPLE_CERTIFICATE: Base64 encoded .p12 certificate
      # - APPLE_CERTIFICATE_PASSWORD: Certificate password
      # - APPLE_ID: Your Apple ID email
      # - APPLE_PASSWORD: App-specific password for Apple ID
      # - APPLE_TEAM_ID: Your Apple Developer Team ID
      #
      # - name: Import certificate (macOS)
      #   if: matrix.platform == 'macos-latest'
      #   env:
      #     APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      #     APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      #     APPLE_ID: ${{ secrets.APPLE_ID }}
      #     APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      #     APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      #   run: |
      #     # Create variables
      #     CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
      #     PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
      #
      #     # Import certificate from secrets
      #     echo -n "$APPLE_CERTIFICATE" | base64 --decode --output $CERTIFICATE_PATH
      #
      #     # Set signing identity
      #     SECURITY_ID=$(security find-identity -v -p codesigning | head -1 | awk '{print $1}' | tr -d '()"')
      #     echo "TAURI_SIGNING_IDENTITY=$SECURITY_ID" >> $GITHUB_ENV
      #     echo "APPLE_SIGNING_IDENTITY=$SECURITY_ID" >> $GITHUB_ENV
      #
      #     # Enable keychain access for GitHub Actions
      #     security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$APPLE_CERTIFICATE_PASSWORD" login.keychain-db || true

      - name: Build Tauri application
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPIMAGE_EXTRACT_AND_RUN: "1"
          NOTEBOOKLM_BUNDLE_RUNTIME: "1"
          POCKET_TTS_BUNDLE_RUNTIME: "1"
          LIBSQLITE3_SYS_USE_PKG_CONFIG: ${{ matrix.os == 'linux' && '1' || '0' }}
          SQLITE3_STATIC: ${{ matrix.os == 'linux' && '0' || '1' }}
          VCPKGRS_DYNAMIC: ${{ matrix.os == 'windows' && '0' || '' }}
          SQLX_OFFLINE: "true"
        with:
          tagName: ${{ steps.get_version.outputs.VERSION }}
          releaseName: 'Incrementum ${{ steps.get_version.outputs.VERSION }}'
          releaseBody: 'See https://github.com/melpomenex/incrementum-tauri/releases/tag/${{ steps.get_version.outputs.VERSION }} for release notes.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.tauri_args }}

      - name: List Windows bundles (debug)
        if: matrix.os == 'windows'
        shell: bash
        run: |
          echo "=== Debug: Listing Windows bundle files ==="
          find src-tauri/target/release/bundle -type f || echo "Bundle dir missing"

      - name: Verify Windows bundles include NotebookLM runtime
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          ./scripts/verify-windows-bundles.ps1

      - name: Verify macOS bundles include NotebookLM runtime
        if: matrix.os == 'macos'
        shell: bash
        run: |
          chmod +x scripts/verify-macos-bundles.sh
          scripts/verify-macos-bundles.sh

      - name: Verify Linux deb bundles include NotebookLM runtime
        if: matrix.os == 'linux'
        shell: bash
        run: |
          chmod +x scripts/verify-deb-bundle.sh
          scripts/verify-deb-bundle.sh

      - name: Upload Windows bundles
        if: matrix.os == 'windows'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.exe.zip
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.msi.zip
          draft: false
          prerelease: false
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS bundles
        if: matrix.os == 'macos'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app.tar.gz
          draft: false
          prerelease: false
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux bundles
        if: matrix.os == 'linux'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
          draft: false
          prerelease: false
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add per-architecture summary
        if: always()
        shell: bash
        run: |
          {
            echo "### Release target \`${{ matrix.id }}\`"
            echo "- Required: \`${{ matrix.required }}\`"
            echo "- Runner: \`${{ matrix.platform }}\`"
            echo "- Architecture: \`${{ matrix.arch }}\`"
            echo "- Job status: \`${{ job.status }}\`"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

  release-appimage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version_tag || github.ref }}
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          sudo apt-get install -y libfuse2 || sudo apt-get install -y libfuse2t64

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.89.0

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Increase Rust stack size
        run: echo "RUST_MIN_STACK=33554432" >> $GITHUB_ENV

      - name: Sync node version and setup cache
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Get version from tag
        id: get_version
        uses: actions/github-script@v7
        with:
          script: |
            const version = context.eventName === 'workflow_dispatch'
              ? '${{ github.event.inputs.version_tag }}'
              : context.ref.replace('refs/tags/', '');
            core.setOutput('VERSION', version);

      - name: Validate tag matches app versions
        shell: bash
        run: |
          TAG_RAW="${{ steps.get_version.outputs.VERSION }}"
          TAG_VERSION="${TAG_RAW#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAURI_VERSION="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          CARGO_VERSION="$(grep '^version = ' src-tauri/Cargo.toml | head -1 | sed -E 's/version = \"([^\"]+)\"/\1/')"

          echo "Tag: ${TAG_RAW}"
          echo "Expected semantic version: ${TAG_VERSION}"
          echo "package.json: ${PACKAGE_VERSION}"
          echo "tauri.conf.json: ${TAURI_VERSION}"
          echo "Cargo.toml: ${CARGO_VERSION}"

          test "${PACKAGE_VERSION}" = "${TAG_VERSION}"
          test "${TAURI_VERSION}" = "${TAG_VERSION}"
          test "${CARGO_VERSION}" = "${TAG_VERSION}"

      - name: Build frontend
        run: npm run build

      - name: Build Tauri AppImage (with fallback repack)
        run: |
          scripts/ci-build-appimage.sh
        env:
          TAURI_BUNDLE_APPIMAGE: "true"
          APPIMAGE_EXTRACT_AND_RUN: "1"
          NOTEBOOKLM_BUNDLE_RUNTIME: "1"
          POCKET_TTS_BUNDLE_RUNTIME: "1"

      - name: Upload AppImage to release
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/appimage/*
          draft: false
          prerelease: false
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-arch:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    steps:
      - name: Install git for checkout
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed git

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version_tag || github.ref }}
          submodules: recursive

      - name: Install Arch dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel webkit2gtk-4.1 gtk3 libappindicator-gtk3 librsvg patchelf npm nodejs rust cargo clang lld sqlite

      - name: Install frontend dependencies
        run: npm ci

      - name: Get version from tag
        id: get_version
        uses: actions/github-script@v7
        with:
          script: |
            const version = context.eventName === 'workflow_dispatch'
              ? '${{ github.event.inputs.version_tag }}'
              : context.ref.replace('refs/tags/', '');
            core.setOutput('VERSION', version);

      - name: Validate tag matches app versions
        shell: bash
        run: |
          TAG_RAW="${{ steps.get_version.outputs.VERSION }}"
          TAG_VERSION="${TAG_RAW#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAURI_VERSION="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          CARGO_VERSION="$(grep '^version = ' src-tauri/Cargo.toml | head -1 | sed -E 's/version = \"([^\"]+)\"/\1/')"

          echo "Tag: ${TAG_RAW}"
          echo "Expected semantic version: ${TAG_VERSION}"
          echo "package.json: ${PACKAGE_VERSION}"
          echo "tauri.conf.json: ${TAURI_VERSION}"
          echo "Cargo.toml: ${CARGO_VERSION}"

          test "${PACKAGE_VERSION}" = "${TAG_VERSION}"
          test "${TAURI_VERSION}" = "${TAG_VERSION}"
          test "${CARGO_VERSION}" = "${TAG_VERSION}"

      - name: Build frontend
        run: npm run build

      - name: Build Tauri application
        run: |
          cd src-tauri
          cargo build --release
        env:
          RUST_MIN_STACK: 33554432
          LIBSQLITE3_SYS_USE_PKG_CONFIG: "1"
          SQLITE3_STATIC: "0"
          ZSTD_SYS_USE_PKG_CONFIG: "1"
          RUSTFLAGS: -C link-arg=-lsqlite3 -C link-arg=-lzstd

      - name: Create Pacman package
        run: |
          PKG_VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | awk -F'"' '{print $2}')
          PKG_RELEASE=1

          mkdir -p arch-pkg/incrementum-${PKG_VERSION}-${PKG_RELEASE}/src
          mkdir -p arch-pkg/incrementum-${PKG_VERSION}-${PKG_RELEASE}/pkg

          # Create PKGBUILD
          cat > arch-pkg/PKGBUILD << EOF
          pkgname=incrementum
          pkgver=${PKG_VERSION}
          pkgrel=1
          pkgdesc="Incrementum - Spaced repetition and incremental reading for effective learning"
          arch=('x86_64')
          url="https://github.com/melpomenex/incrementum-tauri"
          license=('MIT')
          options=('!lto')
          depends=('webkit2gtk-4.1' 'gtk3' 'libappindicator-gtk3' 'librsvg' 'gcc-libs' 'glibc' 'zstd')
          makedepends=('cargo' 'pkgconf')
          optdepends=('notebooklm-py: NotebookLM integration for AI-powered flashcard generation'
                      'python-notebooklm: Alternative NotebookLM package')
          source=("\$pkgname-\$pkgver::git+https://github.com/melpomenex/incrementum-tauri.git#tag=v\$pkgver")
          sha256sums=('SKIP')

          build() {
            cd "\$pkgname-\$pkgver"
            npm ci
            npm run build
            cd src-tauri
            env LIBSQLITE3_SYS_USE_PKG_CONFIG=1 SQLITE3_STATIC=0 ZSTD_SYS_USE_PKG_CONFIG=1 RUSTFLAGS="-C link-arg=-lsqlite3 -C link-arg=-lzstd" cargo build --release
          }

          package() {
            cd "\$pkgname-\$pkgver"
            install -Dm755 "src-tauri/target/release/incrementum-tauri" "\$pkgdir/usr/bin/incrementum"
            install -Dm644 "src-tauri/icons/128x128.png" "\$pkgdir/usr/share/icons/hicolor/128x128/apps/incrementum.png"
            install -Dm644 "src-tauri/incrementum.desktop" "\$pkgdir/usr/share/applications/incrementum.desktop" || true
          }
          EOF

          # Build the package
          cd arch-pkg
          useradd -m builder
          chown -R builder:builder /__w/incrementum-tauri/incrementum-tauri/arch-pkg
          su builder -c "cd /__w/incrementum-tauri/incrementum-tauri/arch-pkg && makepkg --noconfirm --nosign"

      - name: Upload Pacman to release
        uses: softprops/action-gh-release@v2
        with:
          files: arch-pkg/*.pkg.tar.zst
          draft: false
          prerelease: false
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-readiness:
    needs: [release, release-appimage, release-arch]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Summarize required and optional release outcomes
        run: |
          {
            echo "## Release readiness"
            echo "- release matrix: \`${{ needs.release.result }}\`"
            echo "- release-appimage: \`${{ needs.release-appimage.result }}\`"
            echo "- release-arch: \`${{ needs.release-arch.result }}\`"
            echo ""
            echo "Required: \`macos-aarch64\`, \`release-appimage\`, \`release-arch\`"
            echo "Optional: \`windows-x86_64\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce required architecture gate
        run: |
          test "${{ needs.release.result }}" = "success"
          test "${{ needs.release-appimage.result }}" = "success"
          test "${{ needs.release-arch.result }}" = "success"

  create-update-manifest:
    needs: [release-readiness]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version_tag || github.ref }}
          submodules: recursive

      - name: Create update manifest
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const version = context.eventName === 'workflow_dispatch'
              ? '${{ github.event.inputs.version_tag }}'
              : context.ref.replace('refs/tags/', '');
            const pubDate = new Date().toISOString().split('T')[0];

            const manifest = {
              version: version,
              notes: `See https://github.com/melpomenex/incrementum-tauri/releases/tag/${version} for release notes.`,
              pub_date: pubDate,
              platforms: {
                "linux-x86_64": {
                  signature: "",
                  url: `https://github.com/melpomenex/incrementum-tauri/releases/download/${version}/incrementum_${version}_amd64.deb`
                },
                "linux-x86_64-appimage": {
                  signature: "",
                  url: `https://github.com/melpomenex/incrementum-tauri/releases/download/${version}/Incrementum-${version}-x86_64.AppImage`
                },
                "linux-x86_64-arch": {
                  signature: "",
                  url: `https://github.com/melpomenex/incrementum-tauri/releases/download/${version}/incrementum-${version}-1-x86_64.pkg.tar.zst`
                },
                "darwin-x86_64": {
                  signature: "",
                  url: `https://github.com/melpomenex/incrementum-tauri/releases/download/${version}/Incrementum_${version}_x64.dmg.dmg`
                },
                "darwin-aarch64": {
                  signature: "",
                  url: `https://github.com/melpomenex/incrementum-tauri/releases/download/${version}/Incrementum_${version}_aarch64.dmg.dmg`
                },
                "windows-x86_64": {
                  signature: "",
                  url: `https://github.com/melpomenex/incrementum-tauri/releases/download/${version}/Incrementum_${version}_x64-setup.exe`
                }
              }
            };

            fs.writeFileSync('latest.json', JSON.stringify(manifest, null, 2));

      - name: Upload update manifest
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version_tag || github.ref_name }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sync-release-notes:
    needs: [create-update-manifest]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version_tag || github.ref }}

      - name: Extract release notes from changelog
        shell: bash
        run: |
          VERSION="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version_tag || github.ref_name }}"
          VERSION="${VERSION#v}"
          awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\]" { capture=1; next }
            capture && $0 ~ "^## \\[" { exit }
            capture { print }
          ' CHANGELOG.md > release_notes.md

          if [ ! -s release_notes.md ]; then
            echo "Failed to extract release notes for ${VERSION} from CHANGELOG.md"
            exit 1
          fi

      - name: Sync GitHub release body from changelog
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version_tag || github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
