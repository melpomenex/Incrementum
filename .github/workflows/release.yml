name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Release tag to build, e.g. v1.21.12'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    continue-on-error: ${{ !matrix.required }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: macos-aarch64
            platform: macos-latest
            os: macos
            arch: aarch64
            # `app` is required so the updater emits Incrementum_<v>_aarch64.app.tar.gz
            # (and its .sig) alongside the dmg; the updater only consumes the
            # .app.tar.gz, not the .dmg.
            tauri_args: --bundles app,dmg
            required: true
          - id: windows-x86_64
            platform: windows-latest
            os: windows
            arch: x86_64
            tauri_args: --bundles nsis
            required: false
          - id: linux-x86_64
            platform: ubuntu-latest
            os: linux
            arch: x86_64
            tauri_args: --bundles deb
            required: true
          - id: linux-aarch64
            platform: ubuntu-24.04-arm
            os: linux
            arch: aarch64
            tauri_args: --bundles deb
            required: false

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version_tag || github.ref }}
          submodules: recursive

      - name: Install dependencies (Ubuntu only)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libpipewire-0.3-dev libgbm-dev
          sudo apt-get install -y libfuse2 || sudo apt-get install -y libfuse2t64

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.89.0

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Increase Rust stack size (Unix)
        if: matrix.os != 'windows'
        run: echo "RUST_MIN_STACK=33554432" >> $GITHUB_ENV

      - name: Increase Rust stack size (Windows)
        if: matrix.os == 'windows'
        run: echo "RUST_MIN_STACK=33554432" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Sync node version and setup cache
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify command palette shortcut contract
        run: npm run test:run -- src/utils/__tests__/commandPaletteShortcut.test.ts src/utils/__tests__/commandPaletteEvents.test.ts

      - name: Get version from tag
        id: get_version
        uses: actions/github-script@v7
        with:
          script: |
            const version = context.eventName === 'workflow_dispatch'
              ? '${{ github.event.inputs.version_tag }}'
              : context.ref.replace('refs/tags/', '');
            core.setOutput('VERSION', version);

      - name: Validate tag matches app versions
        shell: bash
        run: |
          TAG_RAW="${{ steps.get_version.outputs.VERSION }}"
          TAG_VERSION="${TAG_RAW#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAURI_VERSION="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          CARGO_VERSION="$(grep '^version = ' src-tauri/Cargo.toml | head -1 | sed -E 's/version = \"([^\"]+)\"/\1/')"

          echo "Tag: ${TAG_RAW}"
          echo "Expected semantic version: ${TAG_VERSION}"
          echo "package.json: ${PACKAGE_VERSION}"
          echo "tauri.conf.json: ${TAURI_VERSION}"
          echo "Cargo.toml: ${CARGO_VERSION}"

          test "${PACKAGE_VERSION}" = "${TAG_VERSION}"
          test "${TAURI_VERSION}" = "${TAG_VERSION}"
          test "${CARGO_VERSION}" = "${TAG_VERSION}"

      - name: Install create-dmg (macOS only)
        if: matrix.os == 'macos'
        run: brew install create-dmg

      # macOS code signing - Option 1: Ad-hoc signing (no certificate needed)
      - name: Import ad-hoc signing (macOS)
        if: matrix.os == 'macos'
        run: |
          echo "TAURI_SIGNING_IDENTITY=-" >> $GITHUB_ENV
          echo "APPLE_SIGNING_IDENTITY=-" >> $GITHUB_ENV

      # macOS code signing - Option 2: Proper signing (uncomment if you have certificates)
      # To use this, add these secrets to your GitHub repository:
      # - APPLE_CERTIFICATE: Base64 encoded .p12 certificate
      # - APPLE_CERTIFICATE_PASSWORD: Certificate password
      # - APPLE_ID: Your Apple ID email
      # - APPLE_PASSWORD: App-specific password for Apple ID
      # - APPLE_TEAM_ID: Your Apple Developer Team ID
      #
      # - name: Import certificate (macOS)
      #   if: matrix.platform == 'macos-latest'
      #   env:
      #     APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      #     APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      #     APPLE_ID: ${{ secrets.APPLE_ID }}
      #     APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      #     APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      #   run: |
      #     # Create variables
      #     CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
      #     PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
      #
      #     # Import certificate from secrets
      #     echo -n "$APPLE_CERTIFICATE" | base64 --decode --output $CERTIFICATE_PATH
      #
      #     # Set signing identity
      #     SECURITY_ID=$(security find-identity -v -p codesigning | head -1 | awk '{print $1}' | tr -d '()"')
      #     echo "TAURI_SIGNING_IDENTITY=$SECURITY_ID" >> $GITHUB_ENV
      #     echo "APPLE_SIGNING_IDENTITY=$SECURITY_ID" >> $GITHUB_ENV
      #
      #     # Enable keychain access for GitHub Actions
      #     security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$APPLE_CERTIFICATE_PASSWORD" login.keychain-db || true

      - name: Build frontend
        run: npm run build

      - name: Build sidecar binaries (if missing)
        run: node scripts/download-sidecars.js

      - name: Build Tauri application
        run: npx tauri build ${{ matrix.tauri_args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPIMAGE_EXTRACT_AND_RUN: "1"
          NOTEBOOKLM_BUNDLE_RUNTIME: "1"
          POCKET_TTS_BUNDLE_RUNTIME: "1"
          LIBSQLITE3_SYS_USE_PKG_CONFIG: ${{ matrix.os == 'linux' && '1' || '0' }}
          SQLITE3_STATIC: ${{ matrix.os == 'linux' && '0' || '1' }}
          VCPKGRS_DYNAMIC: ${{ matrix.os == 'windows' && '0' || '' }}
          SQLX_OFFLINE: "true"
          # macOS ad-hoc codesigning (no Developer ID yet). Separate from the
          # updater signing key below.
          TAURI_SIGNING_IDENTITY: "-"
          APPLE_SIGNING_IDENTITY: "-"
          # Updater artifact signing. With `createUpdaterArtifacts: true` in
          # tauri.conf.json, Tauri emits .sig files alongside each bundle and
          # the macOS .app.tar.gz / Windows .nsis.zip updater archives. The
          # public half of this keypair is committed in tauri.conf.json.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: List Windows bundles (debug)
        if: matrix.os == 'windows'
        shell: bash
        run: |
          echo "=== Debug: Listing Windows bundle files ==="
          find src-tauri/target/release/bundle -type f || echo "Bundle dir missing"

      - name: Verify Windows bundles include NotebookLM runtime
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          ./scripts/verify-windows-bundles.ps1

      - name: Verify macOS bundles include NotebookLM runtime
        if: matrix.os == 'macos'
        shell: bash
        run: |
          chmod +x scripts/verify-macos-bundles.sh
          scripts/verify-macos-bundles.sh

      - name: Verify Linux deb bundles include NotebookLM runtime
        if: matrix.os == 'linux'
        shell: bash
        run: |
          chmod +x scripts/verify-deb-bundle.sh
          scripts/verify-deb-bundle.sh

      - name: Upload Windows bundles
        if: matrix.os == 'windows'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.exe.zip
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.msi.zip
            src-tauri/target/release/bundle/**/*.exe.sig
            src-tauri/target/release/bundle/**/*.msi.sig
          draft: false
          prerelease: false
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS bundles
        if: matrix.os == 'macos'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app.tar.gz
            src-tauri/target/release/bundle/**/*.app.tar.gz.sig
          draft: false
          prerelease: false
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux bundles
        if: matrix.os == 'linux'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
          draft: false
          prerelease: false
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add per-architecture summary
        if: always()
        shell: bash
        run: |
          {
            echo "### Release target \`${{ matrix.id }}\`"
            echo "- Required: \`${{ matrix.required }}\`"
            echo "- Runner: \`${{ matrix.platform }}\`"
            echo "- Architecture: \`${{ matrix.arch }}\`"
            echo "- Job status: \`${{ job.status }}\`"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

  release-appimage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version_tag || github.ref }}
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libpipewire-0.3-dev libgbm-dev
          sudo apt-get install -y libfuse2 || sudo apt-get install -y libfuse2t64

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.89.0

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Increase Rust stack size
        run: echo "RUST_MIN_STACK=33554432" >> $GITHUB_ENV

      - name: Sync node version and setup cache
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify command palette shortcut contract
        run: npm run test:run -- src/utils/__tests__/commandPaletteShortcut.test.ts src/utils/__tests__/commandPaletteEvents.test.ts

      - name: Get version from tag
        id: get_version
        uses: actions/github-script@v7
        with:
          script: |
            const version = context.eventName === 'workflow_dispatch'
              ? '${{ github.event.inputs.version_tag }}'
              : context.ref.replace('refs/tags/', '');
            core.setOutput('VERSION', version);

      - name: Validate tag matches app versions
        shell: bash
        run: |
          TAG_RAW="${{ steps.get_version.outputs.VERSION }}"
          TAG_VERSION="${TAG_RAW#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAURI_VERSION="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          CARGO_VERSION="$(grep '^version = ' src-tauri/Cargo.toml | head -1 | sed -E 's/version = \"([^\"]+)\"/\1/')"

          echo "Tag: ${TAG_RAW}"
          echo "Expected semantic version: ${TAG_VERSION}"
          echo "package.json: ${PACKAGE_VERSION}"
          echo "tauri.conf.json: ${TAURI_VERSION}"
          echo "Cargo.toml: ${CARGO_VERSION}"

          test "${PACKAGE_VERSION}" = "${TAG_VERSION}"
          test "${TAURI_VERSION}" = "${TAG_VERSION}"
          test "${CARGO_VERSION}" = "${TAG_VERSION}"

      - name: Build frontend
        run: npm run build

      - name: Build sidecar binaries (if missing)
        run: node scripts/download-sidecars.js

      - name: Build Tauri AppImage (with fallback repack)
        run: |
          scripts/ci-build-appimage.sh
        env:
          TAURI_BUNDLE_APPIMAGE: "true"
          APPIMAGE_EXTRACT_AND_RUN: "1"
          NOTEBOOKLM_BUNDLE_RUNTIME: "1"
          POCKET_TTS_BUNDLE_RUNTIME: "1"

      # ci-build-appimage.sh repacks the AppImage after Tauri builds it
      # (to inject the notebooklm runtime + GStreamer plugins), so the .sig
      # Tauri produced during `tauri build` is for the pre-repack artifact
      # and no longer matches. Re-sign the final AppImage here so the
      # updater verifies the exact bytes the user downloads.
      - name: Sign repacked AppImage for updater
        run: |
          VERSION_NO_V="${{ steps.get_version.outputs.VERSION }}"
          VERSION_NO_V="${VERSION_NO_V#v}"
          npx @tauri-apps/cli signer sign \
            "src-tauri/target/release/bundle/appimage/Incrementum_${VERSION_NO_V}_amd64.AppImage"
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload AppImage to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.sig
          draft: false
          prerelease: false
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-arch:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    steps:
      - name: Install git for checkout
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed git

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version_tag || github.ref }}
          submodules: recursive

      - name: Install Arch dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel webkit2gtk-4.1 gtk3 libappindicator-gtk3 librsvg patchelf npm nodejs rust cargo clang lld sqlite pipewire

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify command palette shortcut contract
        run: npm run test:run -- src/utils/__tests__/commandPaletteShortcut.test.ts src/utils/__tests__/commandPaletteEvents.test.ts

      - name: Get version from tag
        id: get_version
        uses: actions/github-script@v7
        with:
          script: |
            const version = context.eventName === 'workflow_dispatch'
              ? '${{ github.event.inputs.version_tag }}'
              : context.ref.replace('refs/tags/', '');
            core.setOutput('VERSION', version);

      - name: Validate tag matches app versions
        shell: bash
        run: |
          TAG_RAW="${{ steps.get_version.outputs.VERSION }}"
          TAG_VERSION="${TAG_RAW#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAURI_VERSION="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          CARGO_VERSION="$(grep '^version = ' src-tauri/Cargo.toml | head -1 | sed -E 's/version = \"([^\"]+)\"/\1/')"

          echo "Tag: ${TAG_RAW}"
          echo "Expected semantic version: ${TAG_VERSION}"
          echo "package.json: ${PACKAGE_VERSION}"
          echo "tauri.conf.json: ${TAURI_VERSION}"
          echo "Cargo.toml: ${CARGO_VERSION}"

          test "${PACKAGE_VERSION}" = "${TAG_VERSION}"
          test "${TAURI_VERSION}" = "${TAG_VERSION}"
          test "${CARGO_VERSION}" = "${TAG_VERSION}"

      - name: Build frontend
        run: npm run build

      - name: Build Tauri application
        run: npx tauri build --no-bundle
        env:
          RUST_MIN_STACK: 33554432
          LIBSQLITE3_SYS_USE_PKG_CONFIG: "1"
          SQLITE3_STATIC: "0"
          ZSTD_SYS_USE_PKG_CONFIG: "1"
          RUSTFLAGS: -C link-arg=-lsqlite3 -C link-arg=-lzstd

      - name: Create Pacman package
        run: |
          PKG_VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | awk -F'"' '{print $2}')

          mkdir -p arch-pkg

          # Copy built artifacts for the PKGBUILD to install
          cp src-tauri/target/release/incrementum-tauri arch-pkg/incrementum-tauri
          cp src-tauri/icons/128x128.png arch-pkg/128x128.png

          # Generate the XDG desktop entry inline. It is not tracked in the
          # repo (Tauri generates it during bundling, but this job uses
          # --no-bundle), so create it here from the app metadata. The previous
          # `cp src-tauri/incrementum.desktop ... || true` silently no-op'd
          # because that file never existed, causing makepkg to fail later at
          # the source=() validation with "incrementum.desktop was not found".
          # printf avoids heredoc-indentation pitfalls under the YAML block scalar.
          printf '%s\n' \
            '[Desktop Entry]' \
            'Type=Application' \
            'Name=Incrementum' \
            'Comment=Spaced repetition and incremental reading for effective learning' \
            'Exec=incrementum %U' \
            'Icon=incrementum' \
            'Terminal=false' \
            'Categories=Education;' \
            'StartupWMClass=Incrementum' \
            > arch-pkg/incrementum.desktop

          # Create PKGBUILD — binary is already built with embedded frontend assets
          cat > arch-pkg/PKGBUILD << EOF
          pkgname=incrementum
          pkgver=${PKG_VERSION}
          pkgrel=1
          pkgdesc="Incrementum - Spaced repetition and incremental reading for effective learning"
          arch=('x86_64')
          url="https://github.com/melpomenex/incrementum-tauri"
          license=('MIT')
          depends=('webkit2gtk-4.1' 'gtk3' 'libappindicator-gtk3' 'librsvg' 'gcc-libs' 'glibc' 'zstd')
          optdepends=('notebooklm-py: NotebookLM integration for AI-powered flashcard generation'
                      'python-notebooklm: Alternative NotebookLM package')
          source=("incrementum-tauri" "128x128.png" "incrementum.desktop")
          sha256sums=('SKIP' 'SKIP' 'SKIP')

          package() {
            install -Dm755 "\$srcdir/incrementum-tauri" "\$pkgdir/usr/bin/incrementum"
            install -Dm644 "\$srcdir/128x128.png" "\$pkgdir/usr/share/icons/hicolor/128x128/apps/incrementum.png"
            install -Dm644 "\$srcdir/incrementum.desktop" "\$pkgdir/usr/share/applications/incrementum.desktop"
          }
          EOF

          # Build the package
          cd arch-pkg
          useradd -m builder
          chown -R builder:builder /__w/incrementum-tauri/incrementum-tauri/arch-pkg
          su builder -c "cd /__w/incrementum-tauri/incrementum-tauri/arch-pkg && makepkg --noconfirm --nosign"

      - name: Upload Pacman to release
        uses: softprops/action-gh-release@v2
        with:
          files: arch-pkg/*.pkg.tar.zst
          draft: false
          prerelease: false
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-readiness:
    needs: [release, release-appimage, release-arch]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Summarize required and optional release outcomes
        run: |
          {
            echo "## Release readiness"
            echo "- release matrix: \`${{ needs.release.result }}\`"
            echo "- release-appimage: \`${{ needs.release-appimage.result }}\`"
            echo "- release-arch: \`${{ needs.release-arch.result }}\`"
            echo ""
            echo "Required: \`macos-aarch64\`, \`release-appimage\`, \`release-arch\`"
            echo "Optional: \`windows-x86_64\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce required architecture gate
        run: |
          test "${{ needs.release.result }}" = "success"
          test "${{ needs.release-appimage.result }}" = "success"
          test "${{ needs.release-arch.result }}" = "success"

  create-update-manifest:
    needs: [release-readiness]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version_tag || github.ref }}
          submodules: recursive

      - name: Create update manifest
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const tag = context.eventName === 'workflow_dispatch'
              ? '${{ github.event.inputs.version_tag }}'
              : context.ref.replace('refs/tags/', '');
            const version = tag.replace(/^v/, '');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const base = `https://github.com/${owner}/${repo}/releases/download/${tag}`;

            // Map each updater platform key to the asset name produced by the
            // platform jobs. Recognized keys per the Tauri updater are
            // darwin-aarch64 / darwin-x86_64 / linux-x86_64 / windows-x86_64.
            // (The previous "linux-x86_64-appimage" / "-arch" keys were not
            // recognized by the updater and were silently ignored.)
            const platforms = {
              'darwin-aarch64':  { asset: `Incrementum_${version}_aarch64.app.tar.gz` },
              'darwin-x86_64':   { asset: `Incrementum_${version}_x64.app.tar.gz` },
              'linux-x86_64':    { asset: `Incrementum_${version}_amd64.AppImage` },
              'windows-x86_64':  { asset: `Incrementum_${version}_x64-setup.exe` },
            };

            // Locate the release and its assets so we can pull the .sig file
            // contents. The .sig assets were uploaded in the prior stage.
            const release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            const assets = release.data.assets;
            const assetByName = new Map(assets.map(a => [a.name, a]));

            const platformsOut = {};
            const missing = [];
            for (const [key, { asset }] of Object.entries(platforms)) {
              const sigName = `${asset}.sig`;
              const sigAsset = assetByName.get(sigName);
              let signature = '';
              if (sigAsset) {
                // .sig files are small base64-ish text; download via the API
                // using the browser_download_url to avoid rate limits.
                const res = await fetch(sigAsset.browser_download_url);
                signature = (await res.text()).trim();
                if (!signature) missing.push(`${key}: ${sigName} was empty`);
              } else {
                missing.push(`${key}: ${sigName} not found in release assets`);
              }
              platformsOut[key] = {
                signature,
                url: `${base}/${asset}`,
              };
            }

            // Warn (but don't hard-fail) about missing signatures so a single
            // optional arch (e.g. windows) doesn't block the manifest. The
            // updater simply skips platforms whose signature is empty.
            if (missing.length) {
              core.warning(`Signature gaps:\n${missing.join('\n')}`);
            }

            const manifest = {
              version,
              notes: `See https://github.com/${owner}/${repo}/releases/tag/${tag} for release notes.`,
              pub_date: new Date().toISOString(),
              platforms: platformsOut,
            };

            fs.writeFileSync('latest.json', JSON.stringify(manifest, null, 2));
            core.info('latest.json:\n' + JSON.stringify(manifest, null, 2));

      - name: Upload update manifest
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version_tag || github.ref_name }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sync-release-notes:
    needs: [create-update-manifest]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version_tag || github.ref }}

      - name: Extract release notes from changelog
        shell: bash
        run: |
          VERSION="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version_tag || github.ref_name }}"
          VERSION="${VERSION#v}"
          awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\]" { capture=1; next }
            capture && $0 ~ "^## \\[" { exit }
            capture { print }
          ' CHANGELOG.md > release_notes.md

          if [ ! -s release_notes.md ]; then
            echo "Failed to extract release notes for ${VERSION} from CHANGELOG.md"
            exit 1
          fi

      - name: Sync GitHub release body from changelog
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version_tag || github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
