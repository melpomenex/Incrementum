name: Mobile Build Incrementum

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mobile-build-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "lts/*"
  RUST_TOOLCHAIN: "1.89.0"

jobs:
  android-build:
    name: Android build (Tauri)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SKIP_NOTEBOOKLM_SIDECAR: "1"
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Java (Temurin 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: aarch64-linux-android

      - name: Ensure Cargo is on PATH
        run: |
          CARGO_BIN="$(command -v cargo)"
          if [ -z "$CARGO_BIN" ]; then
            echo "::error::cargo not found on PATH after rust-toolchain setup."
            exit 1
          fi
          mkdir -p "$HOME/.cargo/bin"
          ln -sf "$CARGO_BIN" "$HOME/.cargo/bin/cargo"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          echo "CARGO=$CARGO_BIN" >> "$GITHUB_ENV"
          sudo ln -sf "$CARGO_BIN" /usr/local/bin/cargo
          sudo ln -sf "$CARGO_BIN" /usr/bin/cargo
          ls -l "$HOME/.cargo/bin/cargo" /usr/local/bin/cargo /usr/bin/cargo
          cargo --version

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Set up Node.js and npm cache
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Install Tauri mobile CLI helper
        run: npm install --no-save @tauri-apps/cli@^2

      - name: Ensure Android mobile scaffold exists
        run: |
          if [ ! -d "src-tauri/gen/android" ]; then
            echo "::notice::Android scaffold missing. Initializing via 'npm run tauri -- android init --ci'."
            npm run tauri -- android init --ci
          fi

          if [ ! -d "src-tauri/gen/android" ]; then
            echo "::error::Android scaffold is still missing after init."
            exit 1
          fi

      - name: Allow localhost cleartext traffic on Android
        run: |
          set -euo pipefail
          MANIFEST="src-tauri/gen/android/app/src/main/AndroidManifest.xml"
          XML_DIR="src-tauri/gen/android/app/src/main/res/xml"
          NETSEC="$XML_DIR/network_security_config.xml"

          if [ ! -f "$MANIFEST" ]; then
            echo "::error::AndroidManifest.xml not found at $MANIFEST"
            exit 1
          fi

          mkdir -p "$XML_DIR"
          cat > "$NETSEC" <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
            <domain-config cleartextTrafficPermitted="true">
              <domain includeSubdomains="false">localhost</domain>
            </domain-config>
            <domain-config cleartextTrafficPermitted="true">
              <domain includeSubdomains="false">127.0.0.1</domain>
            </domain-config>
          </network-security-config>
          EOF

          if ! grep -q 'android:usesCleartextTraffic=' "$MANIFEST"; then
            sed -i 's#<application #<application android:usesCleartextTraffic="true" android:networkSecurityConfig="@xml/network_security_config" #' "$MANIFEST"
          else
            sed -i 's#android:usesCleartextTraffic="[^"]*"#android:usesCleartextTraffic="true"#g' "$MANIFEST"
            if ! grep -q 'android:networkSecurityConfig=' "$MANIFEST"; then
              sed -i 's#<application #<application android:networkSecurityConfig="@xml/network_security_config" #' "$MANIFEST"
            fi
          fi

          echo "Patched Android manifest for localhost cleartext:"
          grep -nE "usesCleartextTraffic|networkSecurityConfig|<application" "$MANIFEST" || true

      - name: Decide Android signing mode (signed vs unsigned)
        id: android_mode
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=0
          for v in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!v}" ]; then
              missing=1
            fi
          done

          if [ "$missing" -eq 0 ]; then
            echo "mode=provided-keystore" >> "$GITHUB_OUTPUT"
            echo "All Android signing prerequisites detected. Producing signed APK with provided keystore."
          else
            echo "mode=self-signed" >> "$GITHUB_OUTPUT"
            echo "::warning::Android signing secrets missing. Generating ephemeral self-signed keystore for APK signing."
          fi

      - name: Configure Android C toolchain env for cargo build scripts
        run: |
          set -euo pipefail
          if [ -n "${NDK_HOME:-}" ] && [ -d "${NDK_HOME}" ]; then
            NDK_ROOT="${NDK_HOME}"
          else
            NDK_ROOT="$(find "${ANDROID_HOME}/ndk" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -1)"
          fi
          if [ -z "${NDK_ROOT:-}" ] || [ ! -d "${NDK_ROOT}" ]; then
            echo "::error::Android NDK root could not be determined."
            exit 1
          fi

          NDK_BIN="${NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          CC_AARCH64="${NDK_BIN}/aarch64-linux-android24-clang"
          AR_LLVM="${NDK_BIN}/llvm-ar"

          if [ ! -x "$CC_AARCH64" ]; then
            echo "::error::Expected Android clang not found: $CC_AARCH64"
            exit 1
          fi
          if [ ! -x "$AR_LLVM" ]; then
            echo "::error::Expected Android archiver not found: $AR_LLVM"
            exit 1
          fi

          {
            echo "NDK_HOME=$NDK_ROOT"
            echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$CC_AARCH64"
            echo "CC_aarch64_linux_android=$CC_AARCH64"
            echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_AR=$AR_LLVM"
            echo "AR_aarch64_linux_android=$AR_LLVM"
          } >> "$GITHUB_ENV"

      - name: Build Android APK (arm64)
        run: |
          set -o pipefail
          mkdir -p artifacts/mobile-logs
          npm run tauri -- android build --ci --target aarch64 --apk 2>&1 | tee artifacts/mobile-logs/android-build.log

      - name: Sign Android APK (release)
        if: steps.android_mode.outputs.mode == 'provided-keystore' || steps.android_mode.outputs.mode == 'self-signed'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/android-signing
          if [ "${{ steps.android_mode.outputs.mode }}" = "provided-keystore" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > artifacts/android-signing/release.keystore
            KS_PASS="$ANDROID_KEYSTORE_PASSWORD"
            KEY_ALIAS="$ANDROID_KEY_ALIAS"
            KEY_PASS="$ANDROID_KEY_PASSWORD"
          else
            KS_PASS="incrementum-ci"
            KEY_ALIAS="incrementum-ci"
            KEY_PASS="incrementum-ci"
            keytool -genkeypair \
              -v \
              -keystore artifacts/android-signing/release.keystore \
              -storepass "$KS_PASS" \
              -alias "$KEY_ALIAS" \
              -keypass "$KEY_PASS" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Incrementum CI, OU=Mobile, O=Incrementum, L=NA, S=NA, C=US"
          fi

          APK_TO_SIGN="$(find src-tauri/gen/android -type f -name '*release-unsigned.apk' | head -1 || true)"
          if [ -z "$APK_TO_SIGN" ]; then
            APK_TO_SIGN="$(find src-tauri/gen/android -type f -name '*release*.apk' ! -name '*signed*' ! -name '*aligned*' | head -1 || true)"
          fi
          if [ -z "$APK_TO_SIGN" ]; then
            echo "::error::No release APK found to sign."
            exit 1
          fi

          BUILD_TOOLS_DIR="$(find "${ANDROID_HOME}/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -1)"
          if [ -z "$BUILD_TOOLS_DIR" ]; then
            echo "::error::Android build-tools not found."
            exit 1
          fi

          "${BUILD_TOOLS_DIR}/zipalign" -p -f 4 "$APK_TO_SIGN" artifacts/android-signing/app-release-aligned.apk
          "${BUILD_TOOLS_DIR}/apksigner" sign \
            --ks artifacts/android-signing/release.keystore \
            --ks-pass "pass:${KS_PASS}" \
            --ks-key-alias "${KEY_ALIAS}" \
            --key-pass "pass:${KEY_PASS}" \
            --out artifacts/android-signing/incrementum-android-arm64-signed.apk \
            artifacts/android-signing/app-release-aligned.apk
          "${BUILD_TOOLS_DIR}/apksigner" verify --verbose artifacts/android-signing/incrementum-android-arm64-signed.apk

      - name: Collect Android output summary
        if: always()
        run: |
          mkdir -p artifacts/mobile-logs
          {
            echo "=== Android outputs under src-tauri/gen/android/app/build/outputs ==="
            find src-tauri/gen/android/app/build/outputs -type f 2>/dev/null | head -200
            echo
            echo "=== Android-related target outputs under src-tauri/target ==="
            find src-tauri/target -type f \( -name "*.apk" -o -name "*.aab" \) 2>/dev/null | head -200
            echo
            echo "=== Android signed outputs ==="
            find artifacts/android-signing -type f 2>/dev/null | head -200
          } | tee artifacts/mobile-logs/android-outputs.txt

      - name: Upload Android artifacts and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: incrementum-android
          path: |
            src-tauri/gen/android/app/build/outputs/**
            src-tauri/target/**/*.apk
            src-tauri/target/**/*.aab
            artifacts/android-signing/*.apk
            artifacts/mobile-logs/android-build.log
            artifacts/mobile-logs/android-outputs.txt
          if-no-files-found: warn

      - name: Upload Android signed artifact to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/android-signing/incrementum-android-arm64-signed.apk

  ios-build:
    name: iOS build validation (Tauri)
    runs-on: macos-latest
    timeout-minutes: 45
    env:
      SKIP_NOTEBOOKLM_SIDECAR: "1"
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Ensure Cargo is on PATH
        run: |
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          cargo --version

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Set up Node.js and npm cache
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Install Tauri mobile CLI helper
        run: npm install --no-save @tauri-apps/cli@^2

      - name: Ensure iOS mobile scaffold exists
        run: |
          if [ ! -d "src-tauri/gen/apple" ]; then
            echo "::notice::iOS scaffold missing. Initializing via 'npm run tauri -- ios init --ci'."
            npm run tauri -- ios init --ci
          fi

          if [ ! -d "src-tauri/gen/apple" ]; then
            echo "::error::iOS scaffold is still missing after init."
            exit 1
          fi

      - name: Decide iOS build mode (signed vs simulator)
        id: ios_mode
        env:
          IOS_CERT_BASE64: ${{ secrets.IOS_CERT_BASE64 }}
          IOS_CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
          IOS_PROFILE_BASE64: ${{ secrets.IOS_PROFILE_BASE64 }}
          IOS_SIGNING_IDENTITY: ${{ secrets.IOS_SIGNING_IDENTITY }}
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          missing=0
          for v in IOS_CERT_BASE64 IOS_CERT_PASSWORD IOS_PROFILE_BASE64 IOS_SIGNING_IDENTITY IOS_TEAM_ID; do
            if [ -z "${!v}" ]; then
              missing=1
            fi
          done

          if [ "$missing" -eq 0 ]; then
            echo "mode=signed" >> "$GITHUB_OUTPUT"
            echo "All signing prerequisites detected. Running signed iOS build validation."
          else
            echo "mode=simulator" >> "$GITHUB_OUTPUT"
            echo "::warning::iOS signing prerequisites are missing. Running simulator build validation instead."
            echo "Physical iPhone install requires Apple signing credentials (IOS_CERT_BASE64, IOS_CERT_PASSWORD, IOS_PROFILE_BASE64, IOS_SIGNING_IDENTITY, IOS_TEAM_ID)."
          fi

      - name: Import iOS signing certificate and provisioning profile
        if: steps.ios_mode.outputs.mode == 'signed'
        env:
          IOS_CERT_BASE64: ${{ secrets.IOS_CERT_BASE64 }}
          IOS_CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
          IOS_PROFILE_BASE64: ${{ secrets.IOS_PROFILE_BASE64 }}
          IOS_SIGNING_IDENTITY: ${{ secrets.IOS_SIGNING_IDENTITY }}
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          set -euo pipefail

          CERT_PATH="$RUNNER_TEMP/ios_signing_cert.p12"
          PROFILE_PATH="$RUNNER_TEMP/ios_profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"

          echo "$IOS_CERT_BASE64" | base64 --decode > "$CERT_PATH"
          echo "$IOS_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_UUID="$(security cms -D -i "$PROFILE_PATH" | plutil -extract UUID raw -)"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          echo "APPLE_SIGNING_IDENTITY=$IOS_SIGNING_IDENTITY" >> "$GITHUB_ENV"
          echo "APPLE_TEAM_ID=$IOS_TEAM_ID" >> "$GITHUB_ENV"

      - name: Build iOS app (signed)
        if: steps.ios_mode.outputs.mode == 'signed'
        run: |
          set -o pipefail
          mkdir -p artifacts/mobile-logs
          npm run tauri -- ios build --ci 2>&1 | tee artifacts/mobile-logs/ios-build.log

      - name: Build iOS app (simulator fallback)
        if: steps.ios_mode.outputs.mode == 'simulator'
        run: |
          set -o pipefail
          mkdir -p artifacts/mobile-logs
          npm run tauri -- ios build --ci --target aarch64-sim 2>&1 | tee artifacts/mobile-logs/ios-build.log

      - name: Collect iOS output summary
        if: always()
        run: |
          mkdir -p artifacts/mobile-logs
          {
            echo "=== iOS outputs under src-tauri/gen/apple ==="
            find src-tauri/gen/apple -type f \( -name "*.ipa" -o -name "*.app" -o -name "*.dSYM" \) 2>/dev/null | head -200
            echo
            echo "=== iOS-related target outputs under src-tauri/target ==="
            find src-tauri/target -type f \( -name "*.app" -o -name "*.ipa" -o -name "*.dSYM" \) 2>/dev/null | head -200
          } | tee artifacts/mobile-logs/ios-outputs.txt

      - name: Upload iOS artifacts and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: incrementum-ios
          path: |
            src-tauri/gen/apple/**/build/**/*
            src-tauri/target/**/*.app
            src-tauri/target/**/*.ipa
            src-tauri/target/**/*.dSYM
            artifacts/mobile-logs/ios-build.log
            artifacts/mobile-logs/ios-outputs.txt
          if-no-files-found: warn

      - name: Upload iOS signed artifact to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') && steps.ios_mode.outputs.mode == 'signed'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/gen/apple/**/build/**/*.ipa
            src-tauri/target/**/*.ipa

# Mobile CI prerequisites (for signed iOS builds):
# - IOS_CERT_BASE64: Base64-encoded signing certificate (.p12)
# - IOS_CERT_PASSWORD: Password for certificate
# - IOS_PROFILE_BASE64: Base64-encoded provisioning profile (.mobileprovision)
# - IOS_SIGNING_IDENTITY: Signing identity name
# - IOS_TEAM_ID: Apple Developer team ID
# - ANDROID_KEYSTORE_BASE64: Base64-encoded Android keystore
# - ANDROID_KEYSTORE_PASSWORD: Android keystore password
# - ANDROID_KEY_ALIAS: Android key alias
# - ANDROID_KEY_PASSWORD: Android key password
#
# Expected uploaded artifacts:
# - Android: Gradle outputs (APK/AAB when produced) plus android-build.log and android-outputs.txt
# - iOS: Xcode/Tauri outputs (.ipa/.app/.dSYM when produced) plus ios-build.log and ios-outputs.txt
